name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/test_routeiq.py -v --tb=short

      - name: Verify all modules import
        run: |
          python -c "
          from app.classifier import classify_task, detect_agentic, detect_reasoning
          from app.cache import ResponseCache
          from app.session import SessionManager
          from app.policy import TaskPolicy, ROUTING_PROFILES
          from app.budget import BudgetManager
          from app.storage import atomic_read, atomic_write
          from app.router import Router, RouterRequest, MODE_SETTINGS
          from app.backends import get_backend
          from app.analytics import generate_report
          from app.credentials import discover_credentials
          from app.tracing import trace_route
          from app.alerts import AlertManager
          print('All 13 modules import successfully')
          "

      - name: Verify router initializes
        run: |
          python -c "
          from app.router import Router
          r = Router()
          s = r.full_status()
          assert 'budget' in s and 'cache' in s and 'sessions' in s and 'credentials' in s
          print(f'Router OK — {len(s)} status sections')
          "
