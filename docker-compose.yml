services:
  routeiq:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./conf:/app/conf:ro
      - routeiq-state:/app/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  routeiq-state:
